<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sommar Sisu 2026</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sommar Sisu">
<meta name="theme-color" content="#0E1A24">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0E1A24; --panel:#14242F; --panel2:#102029;
    --grid:#1c333f; --line:#2C4A5A; --text:#E8EDEF; --muted:#88A0AB;
    --ember:#FF6B3D; --cyan:#34D1C6; --gold:#F2C14E; --gold2:#FFD97A;
    --display:"Space Grotesk", system-ui, sans-serif;
    --mono:"Space Mono", ui-monospace, monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--ink);color:var(--text);font-family:var(--display);}
  body{max-width:560px;margin:0 auto;padding:18px 16px 92px;min-height:100vh;-webkit-font-smoothing:antialiased;}
  .eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--muted);}
  h1{font-size:25px;font-weight:700;margin:5px 0 0;letter-spacing:-.01em;}
  .head{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:18px;}
  .head .cd{text-align:right;}
  .head .cd .n{font-family:var(--mono);font-weight:700;font-size:26px;color:var(--gold);line-height:1;}
  .head .cd .l{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:3px;}

  .view{display:none;}
  .view.on{display:block;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

  .crownwrap{text-align:center;padding:8px 0 4px;}
  .crowns{font-size:36px;letter-spacing:8px;line-height:1;filter:grayscale(1) opacity(.3);}
  .crowns .lit{filter:none;display:inline-block;}
  .crowns .lit.pop{animation:pop .45s ease;}
  @keyframes pop{0%{transform:scale(.4);}60%{transform:scale(1.25);}100%{transform:scale(1);}}
  .count{font-family:var(--mono);font-weight:700;font-size:15px;margin-top:8px;color:var(--muted);}
  .count b{color:var(--gold);}
  .perfect{color:var(--gold);font-weight:600;font-size:13px;min-height:16px;margin-top:2px;}

  .cat{background:var(--panel);border:1px solid var(--line);border-radius:14px;margin-top:11px;overflow:hidden;transition:border-color .15s;}
  .cat.done{border-color:var(--gold);}
  .cathead{display:flex;align-items:center;gap:13px;padding:13px 14px;cursor:pointer;}
  .cathead .ico{font-size:23px;width:30px;text-align:center;flex:0 0 30px;}
  .cathead .mid{flex:1;min-width:0;}
  .cathead .nm{font-weight:600;font-size:15px;}
  .cat.done .nm{color:var(--gold2);}
  .cathead .hint{font-size:12px;color:var(--muted);margin-top:2px;}
  .cathead .chk{flex:0 0 28px;width:28px;height:28px;border-radius:50%;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:14px;color:transparent;transition:all .18s;}
  .cat.done .chk{background:var(--gold);border-color:var(--gold);color:#0E1A24;}
  .detail{border-top:1px solid var(--line);padding:14px;display:none;}
  .cat.open .detail{display:block;}

  .seg{display:flex;gap:8px;margin-bottom:12px;}
  .seg button{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--muted);border-radius:10px;padding:9px;font-family:var(--display);font-size:13px;cursor:pointer;}
  .seg button.on{border-color:var(--cyan);color:var(--cyan);background:#0f2a2c;}
  .fields{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;}
  .fld{flex:1;min-width:60px;}
  .fld.w{flex:0 0 100%;}
  label{display:block;font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
  input{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--text);font-family:var(--mono);font-size:14px;border-radius:8px;padding:9px;}
  .save{margin-top:12px;width:100%;cursor:pointer;border:none;border-radius:9px;padding:11px;font-weight:600;font-size:14px;color:#0E1A24;background:var(--gold);font-family:var(--display);}
  .save:hover{filter:brightness(1.06);}
  .spec{font-size:13px;color:var(--text);line-height:1.6;margin-bottom:10px;}
  .spec .m{color:var(--muted);}
  .specrow{display:flex;justify-content:space-between;border-bottom:1px solid var(--grid);padding:5px 0;font-size:13px;}
  .specrow b{font-family:var(--mono);}
  .doneline{font-size:13px;color:var(--gold2);margin-bottom:10px;}
  .undo{background:none;border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:8px 12px;font-family:var(--display);font-size:12px;cursor:pointer;}

  .kx{display:flex;align-items:center;gap:11px;padding:10px 2px;border-bottom:1px solid var(--grid);cursor:pointer;}
  .kx:last-child{border-bottom:none;}
  .kx .box{flex:0 0 22px;width:22px;height:22px;border-radius:6px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent;}
  .kx.on .box{background:var(--cyan);border-color:var(--cyan);color:#0E1A24;}
  .kx .kn{font-size:14px;}
  .kx.on .kn{color:var(--text);}
  .kcount{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:10px;text-align:center;}
  .kcount b{color:var(--gold);}

  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-top:18px;}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 8px;text-align:center;}
  .stat .v{font-family:var(--mono);font-weight:700;font-size:22px;line-height:1;}
  .stat .v.gold{color:var(--gold);}
  .stat .k{font-size:10px;color:var(--muted);letter-spacing:.06em;margin-top:5px;text-transform:uppercase;}
  .badge{margin-top:14px;background:var(--panel2);border:1px dashed var(--line);border-radius:12px;padding:12px 14px;font-size:13px;color:var(--muted);}
  .badge b{color:var(--gold);}

  .calhead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
  .calhead .t{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}
  .legend{font-size:11px;color:var(--muted);}
  .week{display:grid;grid-template-columns:26px repeat(7,1fr);gap:5px;margin-bottom:5px;align-items:center;}
  .week .wl{font-family:var(--mono);font-size:10px;color:var(--muted);}
  .cell{aspect-ratio:1/1;border-radius:8px;background:var(--panel2);border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;padding:2px;}
  .cell .d{font-family:var(--mono);font-size:10px;color:var(--muted);line-height:1;}
  .cell .dots{display:flex;gap:2px;margin-top:3px;}
  .cell .dot{width:5px;height:5px;border-radius:50%;background:#2b4a5a;}
  .cell .dot.on{background:var(--gold);}
  .cell.c1{background:#3a3a22;} .cell.c2{background:#5c4f1f;} .cell.c3{background:var(--gold);border-color:var(--gold2);}
  .cell.c3 .d{color:#0E1A24;} .cell.c3 .dot{background:#0E1A2455;} .cell.c3 .dot.on{background:#0E1A24;}
  .cell.today{box-shadow:0 0 0 2px var(--cyan);}
  .cell.future{opacity:.4;cursor:default;}
  .cell.blank{background:none;border:none;cursor:default;}
  .editor{margin-top:16px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;}
  .editor .et{font-size:14px;font-weight:600;margin-bottom:4px;}
  .editor .es{font-size:12px;color:var(--muted);margin-bottom:10px;}
  .mini{display:flex;gap:8px;}
  .mini button{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--muted);border-radius:10px;padding:11px 4px;font-family:var(--display);font-size:13px;cursor:pointer;}
  .mini button .mi{font-size:18px;display:block;margin-bottom:3px;}
  .mini button.on{border-color:var(--gold);background:#23351f;color:var(--gold2);}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;}
  .card.ember{box-shadow:inset 0 2px 0 rgba(255,107,61,.5);}
  .card.cyan{box-shadow:inset 0 2px 0 rgba(52,209,198,.5);}
  .card.aqua{box-shadow:inset 0 2px 0 rgba(125,231,223,.45);}
  .card .tag{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;}
  .ember .tag{color:var(--ember);} .cyan .tag{color:var(--cyan);} .aqua .tag{color:var(--gold2);}
  .card .goal{font-size:12px;color:var(--muted);margin-top:3px;}
  .big{font-family:var(--mono);font-weight:700;font-size:34px;margin:12px 0 2px;line-height:1;}
  .ember .big{color:var(--ember);} .cyan .big{color:var(--cyan);} .aqua .big{color:var(--gold2);}
  .big .u{font-size:14px;color:var(--muted);font-weight:400;margin-left:6px;}
  .gap{font-size:13px;color:var(--muted);min-height:17px;}
  .gap.hit{color:var(--gold);font-weight:600;}
  svg{display:block;width:100%;height:120px;margin:10px 0 4px;}
  .axislbl{font-family:var(--mono);font-size:9px;fill:var(--muted);}
  .loglist{margin-top:10px;border-top:1px solid var(--line);padding-top:8px;}
  .lrow{display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;color:var(--muted);padding:4px 0;}
  .lrow b{color:var(--text);}
  .empty{font-size:12px;color:var(--muted);}

  .nav{position:fixed;left:0;right:0;bottom:0;background:#0c161e;border-top:1px solid var(--line);display:flex;max-width:560px;margin:0 auto;padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:5;}
  .nav button{flex:1;background:none;border:none;color:var(--muted);font-family:var(--display);font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:4px;}
  .nav button .ni{font-size:18px;}
  .nav button.on{color:var(--gold);}
  input:focus,button:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
  @media (prefers-reduced-motion: reduce){*{animation:none !important;transition:none !important;}}
</style>
</head>
<body>
  <div class="head">
    <div><div class="eyebrow">Form mot 5.8 &middot; 2026</div><h1>Sommar Sisu</h1></div>
    <div class="cd"><div class="n" id="daysleft">&ndash;</div><div class="l">dagar kvar</div></div>
  </div>

  <section class="view on" id="v-today">
    <div class="crownwrap">
      <div class="crowns" id="crownrow">&#9875;&#9875;&#9875;</div>
      <div class="count" id="todaycount"></div>
      <div class="perfect" id="perfectmsg"></div>
    </div>
    <div id="cats"></div>
    <div class="stats">
      <div class="stat"><div class="v gold" id="st-streak">0</div><div class="k">svit, dagar</div></div>
      <div class="stat"><div class="v" id="st-perfect">0</div><div class="k">perfekta dagar</div></div>
      <div class="stat"><div class="v" id="st-total">0</div><div class="k">ankare totalt</div></div>
    </div>
    <div class="badge" id="badge"></div>
    <div id="storeinfo" style="text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--muted);margin-top:14px;"></div>
  </section>

  <section class="view" id="v-cal">
    <div class="calhead"><div class="t">Ankarkalender 19.6 &ndash; 5.8</div><div class="legend" id="weekcrowns"></div></div>
    <div id="calendar"></div>
    <div class="editor" id="editor"></div>
  </section>

  <section class="view" id="v-goals">
    <div class="card ember">
      <div class="tag">Burner 400</div><div class="goal">M&aring;l: hela 400 under 20:00</div>
      <div class="big" id="b-best">&ndash;<span class="u">b&auml;sta 400</span></div>
      <div class="gap" id="b-gap"></div>
      <svg id="b-chart" viewBox="0 0 300 120" preserveAspectRatio="none"></svg>
      <div class="loglist" id="b-log"></div>
    </div>
    <div class="card aqua">
      <div class="tag">Spurter</div><div class="goal">B&auml;sta tid per distans</div>
      <div class="big" id="s-best">&ndash;<span class="u">b&auml;sta 300 m</span></div>
      <div class="gap" id="s-gap"></div>
      <div class="loglist" id="s-log"></div>
    </div>
    <div class="card cyan">
      <div class="tag">Cooper</div><div class="goal">M&aring;l: &ouml;ver 2400 m p&aring; 12 min</div>
      <div class="big" id="c-best">&ndash;<span class="u">b&auml;sta m</span></div>
      <div class="gap" id="c-gap"></div>
      <svg id="c-chart" viewBox="0 0 300 120" preserveAspectRatio="none"></svg>
      <div class="loglist" id="c-log"></div>
      <div class="fields" style="margin-top:10px;">
        <div class="fld"><label>Cooper meter</label><input id="c-meters" type="number" min="0" step="10" placeholder="2300" inputmode="numeric"></div>
        <button class="save" style="flex:0 0 auto;width:auto;padding:10px 16px;" id="c-add">Logga</button>
      </div>
    </div>
  </section>

  <nav class="nav">
    <button data-v="today" class="on"><span class="ni">&#9875;</span>Idag</button>
    <button data-v="cal"><span class="ni">&#9638;</span>Kalender</button>
    <button data-v="goals"><span class="ni">&#9678;</span>M&aring;l</button>
  </nav>

<script>
const GOAL_DATE=new Date(2026,7,5,23,59,59);
const START=new Date(2026,5,19);
const B_GOAL=1200, C_GOAL=2400;
const KNEE=[
  ["k1","Ryggrotation med kapp"],
  ["k2","Foam roller framsida lar"],
  ["k3","Foam roller ITB, utsida lar"],
  ["k4","Backentippning"],
  ["k5","Hoftabduktion + ytterrotation"]
];
const KNEE_NAMES={k1:"Ryggrotation med k\u00e4pp",k2:"Foam roller framsida l\u00e5r",k3:"Foam roller ITB, utsida l\u00e5r",k4:"B\u00e4ckentippning",k5:"H\u00f6ftabduktion + ytterrotation"};
const BURNER=[
  {sq:10,pu:10,mc:10,bu:5,r:3},
  {sq:15,pu:15,mc:15,bu:8,r:3},
  {sq:15,pu:15,mc:15,bu:10,r:4},
  {sq:20,pu:20,mc:20,bu:12,r:4},
  {sq:20,pu:20,mc:20,bu:15,r:5},
  {sq:20,pu:20,mc:20,bu:20,r:5},
  {sq:20,pu:20,mc:20,bu:20,r:5}
];
const ANCHOR="\u2693";
let days={}, cooper=[], openCat=null, uiRunType=null, lastTodayCount=0;

const pad=n=>String(n).padStart(2,"0");
const iso=d=>d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
const todayISO=()=>iso(new Date());
const dShort=s=>{const p=s.split("-");return (+p[2])+"."+(+p[1]);};
const fmt=s=>(s==null||isNaN(s))?"\u2013":Math.floor(s/60)+":"+pad(Math.round(s%60));
function parseTime(s){s=(s||"").trim();if(!s)return null;if(s.includes(":")){const a=s.split(":");const v=(+a[0])*60+(+a[1]||0);return isNaN(v)?null:v;}const v=+s;return isNaN(v)?null:v;}
function burnerTotal(w){return (w.sq+w.pu+w.mc+w.bu)*w.r;}
function crownCount(o){if(!o)return 0;return (o.run&&o.run.done?1:0)+(o.str&&o.str.done?1:0)+(o.knee&&o.knee.done?1:0);}
function weekIndex(d){if(d<START)return 1;return Math.min(Math.max(Math.floor((d-START)/(7*864e5))+1,1),7);}
function daysLeft(){return Math.max(0,Math.ceil((GOAL_DATE-new Date())/864e5));}

const hasWS = typeof window!=="undefined" && window.storage && window.storage.get && window.storage.set;
async function loadKey(k,def){
  if(hasWS){ try{ const r=await window.storage.get(k); return r&&r.value?JSON.parse(r.value):def; }catch(e){ return def; } }
  try{ const v=localStorage.getItem("ss26:"+k); if(v!=null) return JSON.parse(v); }catch(e){}
  return def;
}
async function save(k,v){
  if(hasWS){ try{ await window.storage.set(k,JSON.stringify(v)); }catch(e){} return; }
  try{ localStorage.setItem("ss26:"+k, JSON.stringify(v)); }catch(e){}
}
function storageMode(){
  if(hasWS) return "claude";
  try{ localStorage.setItem("ss26:_t","1"); localStorage.removeItem("ss26:_t"); return "local"; }catch(e){ return "memory"; }
}

async function init(){
  days=await loadKey("days",{});
  cooper=await loadKey("cooper-log",[]);
  document.getElementById("daysleft").textContent=daysLeft();
  renderToday(); renderCal(); renderGoals();
  const sm=storageMode();
  document.getElementById("storeinfo").textContent =
    sm==="claude" ? "Lagring: Claude-appen, synkar i den h\u00e4r chatten"
    : sm==="local" ? "Lagring: lokalt p\u00e5 enheten, sparas mellan g\u00e5ngerna"
    : "Lagring: endast denna session";
}
function dayObj(d){ if(!days[d])days[d]={}; return days[d]; }

/* -------- TODAY -------- */
function runHint(wd){ return (wd===2)?"Idag: spurter eller intervaller":(wd===1||wd===4)?"Idag: vila eller lugn PK":"Idag: PK i l\u00e5g puls"; }
function strHint(wd,wk){ if(wd===3)return "Idag: Burner v"+wk; if(wd===6)return "Idag: tung styrka (kraft)"; return "Idag: valfritt"; }

function renderToday(){
  const t=todayISO(), o=days[t]||{}, wd=new Date().getDay(), wk=weekIndex(new Date());
  const cc=crownCount(o);
  const row=document.getElementById("crownrow");
  row.innerHTML=[0,1,2].map(i=>'<span class="'+(i<cc?'lit':'')+(i<cc&&cc>lastTodayCount&&i===cc-1?' pop':'')+'">'+ANCHOR+'</span>').join("");
  lastTodayCount=cc;
  document.getElementById("todaycount").innerHTML="Idag: <b>"+cc+"</b> / 3 ankare";
  document.getElementById("perfectmsg").textContent=cc===3?"Perfekt dag. Alla tre.":"";

  const st=streaks();
  document.getElementById("st-streak").textContent=st.streak;
  document.getElementById("st-perfect").textContent=st.perfect;
  document.getElementById("st-total").textContent=st.total;
  const marks=[10,25,50,75,100,150];
  const next=marks.find(m=>m>st.total);
  document.getElementById("badge").innerHTML=next
    ? "N\u00e4sta m\u00e4rke vid <b>"+next+" ankare</b>. "+(next-st.total)+" kvar."
    : "Alla m\u00e4rken tagna. <b>"+st.total+" ankare.</b> Respekt.";

  const c=document.getElementById("cats");
  c.innerHTML = catBlock("run","\uD83C\uDFC3","L\u00f6pning",runHint(wd),o.run&&o.run.done, runDetail(t,o,wd))
    + catBlock("str","\uD83D\uDCAA","Lihaskunto",strHint(wd,wk),o.str&&o.str.done, strDetail(t,o,wd,wk))
    + catBlock("knee","\uD83E\uDDB5","Kn\u00e4-\u00f6vningar","Bocka rörelser, ankare vid 2",o.knee&&o.knee.done, kneeDetail(t,o));
  wireToday(t,wd,wk);
}
function catBlock(key,ico,nm,hint,done,detailHTML){
  return '<div class="cat'+(done?' done':'')+(openCat===key?' open':'')+'" data-cat="'+key+'">'
    +'<div class="cathead" data-head="'+key+'"><div class="ico">'+ico+'</div>'
    +'<div class="mid"><div class="nm">'+nm+'</div><div class="hint">'+hint+'</div></div>'
    +'<div class="chk">\u2713</div></div>'
    +'<div class="detail">'+detailHTML+'</div></div>';
}

function runDetail(t,o,wd){
  if(o.run&&o.run.done){
    const r=o.run, sum = r.type==="spurt"
      ? (r.antal+" \u00d7 "+r.dist+" m, b\u00e4sta "+fmt(r.sec))
      : (r.min+" min PK");
    return '<div class="doneline">Loggat: '+sum+'</div><button class="undo" data-undo="run">\u00c5ngra</button>';
  }
  if(uiRunType===null) uiRunType=(wd===2)?"spurt":"pk";
  let f;
  if(uiRunType==="pk"){
    f='<div class="fields"><div class="fld w"><label>Tid (min)</label><input id="r-min" type="number" min="1" placeholder="45" inputmode="numeric"></div></div>';
  } else {
    f='<div class="fields">'
      +'<div class="fld"><label>L\u00e4ngd (m)</label><input id="r-dist" type="number" value="300" inputmode="numeric"></div>'
      +'<div class="fld"><label>Antal</label><input id="r-antal" type="number" value="5" inputmode="numeric"></div>'
      +'<div class="fld"><label>B\u00e4sta tid</label><input id="r-best" type="text" placeholder="1:16" inputmode="numeric"></div></div>';
  }
  return '<div class="seg"><button data-rt="pk" class="'+(uiRunType==="pk"?"on":"")+'">PK</button>'
    +'<button data-rt="spurt" class="'+(uiRunType==="spurt"?"on":"")+'">Spurter</button></div>'
    + f + '<button class="save" data-save="run">Spara pass</button>';
}
function strDetail(t,o,wd,wk){
  if(o.str&&o.str.done){
    const s=o.str, sum = s.type==="burner" ? ("Burner"+(s.sec?", "+fmt(s.sec):"")) : s.type==="styrka" ? "Tung styrka" : "Extrapass";
    return '<div class="doneline">Loggat: '+sum+'</div><button class="undo" data-undo="str">\u00c5ngra</button>';
  }
  if(wd===3){
    const w=BURNER[wk-1], tot=burnerTotal(w);
    let rows=''
      +'<div class="specrow"><span>Kn\u00e4b\u00f6j</span><b>'+w.r+' \u00d7 '+w.sq+'</b></div>'
      +'<div class="specrow"><span>Armh\u00e4vningar</span><b>'+w.r+' \u00d7 '+w.pu+'</b></div>'
      +'<div class="specrow"><span>Mountain climbers</span><b>'+w.r+' \u00d7 '+w.mc+'</b></div>'
      +'<div class="specrow"><span>Burpees</span><b>'+w.r+' \u00d7 '+w.bu+'</b></div>';
    return '<div class="spec"><b>Burner v'+wk+'</b> <span class="m">&middot; '+w.r+' varv &middot; '+tot+' rep totalt</span></div>'
      + rows
      + '<div class="fields" style="margin-top:12px;"><div class="fld w"><label>Tid (mm:ss)</label><input id="s-time" type="text" placeholder="'+(tot>=400?"19:30":"frivilligt")+'" inputmode="numeric"></div></div>'
      + '<button class="save" data-save="str">Spara Burner</button>';
  }
  if(wd===6){
    return '<div class="spec">Tung styrka helkropp: kn\u00e4b\u00f6j, marklyft, utfall, press, rodd. <span class="m">Passet f\u00f6r kraften.</span></div>'
      + '<button class="save" data-save="str">Klar</button>';
  }
  return '<div class="spec">Valfritt extrapass om kroppen vill. <span class="m">Annars vila.</span></div>'
    + '<button class="save" data-save="str">Klar</button>';
}
function kneeDetail(t,o){
  const done=(o.knee&&o.knee.ex)?o.knee.ex:[];
  let list=KNEE.map(function(e){const on=done.indexOf(e[0])>=0;return '<div class="kx'+(on?' on':'')+'" data-kex="'+e[0]+'"><div class="box">\u2713</div><div class="kn">'+KNEE_NAMES[e[0]]+'</div></div>';}).join("");
  return list + '<div class="kcount">'+done.length+' / 5 gjorda &middot; ankare vid <b>2</b></div>';
}

function wireToday(t,wd,wk){
  document.querySelectorAll("[data-head]").forEach(function(el){
    el.addEventListener("click",function(){ const k=el.getAttribute("data-head"); openCat=(openCat===k?null:k); if(k==="run")uiRunType=null; renderToday(); });
  });
  document.querySelectorAll("[data-rt]").forEach(function(b){
    b.addEventListener("click",function(e){ e.stopPropagation(); uiRunType=b.getAttribute("data-rt"); renderToday(); });
  });
  document.querySelectorAll("[data-save]").forEach(function(b){
    b.addEventListener("click",function(e){ e.stopPropagation(); const k=b.getAttribute("data-save"); if(k==="run")saveRun(t); else saveStr(t,wd,wk); });
  });
  document.querySelectorAll("[data-undo]").forEach(function(b){
    b.addEventListener("click",function(e){ e.stopPropagation(); const k=b.getAttribute("data-undo"); delete dayObj(t)[k]; save("days",days); renderToday(); renderCal(); });
  });
  document.querySelectorAll("[data-kex]").forEach(function(b){
    b.addEventListener("click",function(e){ e.stopPropagation(); toggleKnee(t,b.getAttribute("data-kex")); });
  });
}
async function saveRun(t){
  const o=dayObj(t);
  if(uiRunType==="spurt"){
    const dist=parseInt((document.getElementById("r-dist")||{}).value,10);
    const antal=parseInt((document.getElementById("r-antal")||{}).value,10);
    const sec=parseTime((document.getElementById("r-best")||{}).value);
    if(!dist||!antal||sec==null){return;}
    o.run={done:true,type:"spurt",dist:dist,antal:antal,sec:sec};
  } else {
    const min=parseInt((document.getElementById("r-min")||{}).value,10);
    if(!min){return;}
    o.run={done:true,type:"pk",min:min};
  }
  await save("days",days); openCat=null; renderToday(); renderCal(); renderGoals();
}
async function saveStr(t,wd,wk){
  const o=dayObj(t);
  if(wd===3){
    const w=BURNER[wk-1], tot=burnerTotal(w), sec=parseTime((document.getElementById("s-time")||{}).value);
    o.str={done:true,type:"burner",total:tot,sec:sec||null};
  } else if(wd===6){
    o.str={done:true,type:"styrka"};
  } else {
    o.str={done:true,type:"other"};
  }
  await save("days",days); openCat=null; renderToday(); renderCal(); renderGoals();
}
async function toggleKnee(t,id){
  const o=dayObj(t);
  if(!o.knee)o.knee={ex:[],done:false};
  const i=o.knee.ex.indexOf(id);
  if(i>=0)o.knee.ex.splice(i,1); else o.knee.ex.push(id);
  o.knee.done=o.knee.ex.length>=2;
  if(o.knee.ex.length===0)delete o.knee;
  await save("days",days); renderToday(); renderCal();
}
function streaks(){
  let total=0,perfect=0;
  for(const k in days){const c=crownCount(days[k]);total+=c;if(c===3)perfect++;}
  let streak=0,d=new Date();
  if(crownCount(days[todayISO()])===0)d.setDate(d.getDate()-1);
  while(crownCount(days[iso(d)])>=1){streak++;d.setDate(d.getDate()-1);}
  return {total:total,perfect:perfect,streak:streak};
}

/* -------- CALENDAR -------- */
function allDates(){const out=[];let d=new Date(START);const end=new Date(2026,7,5);while(d<=end){out.push(iso(d));d=new Date(d.getTime()+864e5);}return out;}
let selDate=null;
function renderCal(){
  if(!selDate)selDate=todayISO();
  const dates=allDates(), cal=document.getElementById("calendar"); cal.innerHTML="";
  const t=todayISO();
  for(let w=0;w<7;w++){
    const row=document.createElement("div");row.className="week";
    row.innerHTML='<div class="wl">v'+(w+1)+'</div>';
    for(let i=0;i<7;i++){
      const idx=w*7+i, ds=dates[idx];
      if(!ds){row.insertAdjacentHTML("beforeend",'<div class="cell blank"></div>');continue;}
      const cnt=crownCount(days[ds]);
      const cell=document.createElement("div");
      cell.className="cell c"+cnt+(ds===t?" today":"")+(ds>t?" future":"");
      const dots=[0,1,2].map(j=>'<span class="dot'+(j<cnt?' on':'')+'"></span>').join("");
      cell.innerHTML='<span class="d">'+(+ds.split("-")[2])+'</span><span class="dots">'+dots+'</span>';
      if(ds<=t)cell.addEventListener("click",function(){selDate=ds;renderEditor();});
      row.appendChild(cell);
    }
    cal.appendChild(row);
  }
  const wk=weekIndex(new Date());
  const ws=new Date(START.getTime()+(wk-1)*7*864e5);
  let wc=0;for(let i=0;i<7;i++){wc+=crownCount(days[iso(new Date(ws.getTime()+i*864e5))]);}
  document.getElementById("weekcrowns").innerHTML="Denna vecka: <b style='color:var(--gold)'>"+wc+"</b> "+ANCHOR;
  renderEditor();
}
function renderEditor(){
  const ed=document.getElementById("editor"), o=days[selDate]||{};
  const isToday=selDate===todayISO();
  const cats=[["run","\uD83C\uDFC3","L\u00f6pning"],["str","\uD83D\uDCAA","Lihaskunto"],["knee","\uD83E\uDDB5","Kn\u00e4"]];
  ed.innerHTML='<div class="et">'+(isToday?"Idag, ":"")+dShort(selDate)+'</div>'
    +'<div class="es">Snabbmarkera f\u00f6r missade dagar. Full loggning sker p\u00e5 Idag-fliken.</div>'
    +'<div class="mini">'+cats.map(function(c){const on=o[c[0]]&&o[c[0]].done;return '<button data-q="'+c[0]+'" class="'+(on?"on":"")+'"><span class="mi">'+c[1]+'</span>'+c[2]+'</button>';}).join("")+'</div>';
  ed.querySelectorAll("[data-q]").forEach(function(b){b.addEventListener("click",function(){quickToggle(selDate,b.getAttribute("data-q"));});});
}
async function quickToggle(date,cat){
  const o=dayObj(date);
  if(!o[cat])o[cat]={};
  o[cat].done=!o[cat].done;
  if(!o[cat].done){ if(cat==="knee"&&o[cat].ex&&o[cat].ex.length){o[cat].done=false;} else delete o[cat]; }
  await save("days",days); renderCal(); renderToday();
}

/* -------- GOALS -------- */
function burnerEntries(){
  const out=[];
  for(const k in days){const s=days[k]&&days[k].str;if(s&&s.type==="burner"&&s.sec){out.push({date:k,total:s.total||0,sec:s.sec});}}
  out.sort(function(a,b){return a.date<b.date?-1:1;});
  return out;
}
function sprintEntries(){
  const out=[];
  for(const k in days){const r=days[k]&&days[k].run;if(r&&r.type==="spurt"){out.push({date:k,dist:r.dist,antal:r.antal,sec:r.sec});}}
  out.sort(function(a,b){return a.date<b.date?-1:1;});
  return out;
}
function lineChart(id,pts,goal,color,fmtFn){
  const svg=document.getElementById(id),W=300,H=120,pL=8,pR=8,pT=12,pB=18,ns="http://www.w3.org/2000/svg";
  svg.innerHTML="";
  const vals=pts.map(p=>p.y).concat([goal]);let mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals);
  if(mn===mx){mn-=10;mx+=10;}const sp=(mx-mn)||1,m=sp*.15;mn-=m;mx+=m;
  const X=i=>pL+(pts.length<=1?(W-pL-pR)/2:i*(W-pL-pR)/(pts.length-1));
  const Y=v=>pT+(mx-v)/(mx-mn)*(H-pT-pB);
  const gy=Y(goal),gold=getComputedStyle(document.documentElement).getPropertyValue("--gold").trim();
  let gl=document.createElementNS(ns,"line");gl.setAttribute("x1",pL);gl.setAttribute("x2",W-pR);gl.setAttribute("y1",gy);gl.setAttribute("y2",gy);gl.setAttribute("stroke",gold);gl.setAttribute("stroke-width","1");gl.setAttribute("stroke-dasharray","4 3");gl.setAttribute("opacity",".85");svg.appendChild(gl);
  let gt=document.createElementNS(ns,"text");gt.setAttribute("x",W-pR);gt.setAttribute("y",gy-4);gt.setAttribute("text-anchor","end");gt.setAttribute("class","axislbl");gt.textContent="mal "+fmtFn(goal);svg.appendChild(gt);
  if(!pts.length){let tx=document.createElementNS(ns,"text");tx.setAttribute("x",W/2);tx.setAttribute("y",H/2+4);tx.setAttribute("text-anchor","middle");tx.setAttribute("class","axislbl");tx.textContent="logga ditt forsta forsok";svg.appendChild(tx);return;}
  if(pts.length>1){let d="";pts.forEach(function(p,i){d+=(i?"L":"M")+X(i)+" "+Y(p.y);});let pa=document.createElementNS(ns,"path");pa.setAttribute("d",d);pa.setAttribute("fill","none");pa.setAttribute("stroke",color);pa.setAttribute("stroke-width","2");pa.setAttribute("stroke-linejoin","round");svg.appendChild(pa);}
  pts.forEach(function(p,i){let c=document.createElementNS(ns,"circle");c.setAttribute("cx",X(i));c.setAttribute("cy",Y(p.y));c.setAttribute("r",p.solid===false?3:4.5);c.setAttribute("fill",p.solid===false?"#0E1A24":color);c.setAttribute("stroke",color);c.setAttribute("stroke-width","1.6");svg.appendChild(c);
    let l=document.createElementNS(ns,"text");l.setAttribute("x",X(i));l.setAttribute("y",H-5);l.setAttribute("text-anchor","middle");l.setAttribute("class","axislbl");l.textContent=p.lbl;svg.appendChild(l);});
}
function renderGoals(){
  const be=burnerEntries();
  const full=be.filter(e=>e.total>=400), best=full.length?Math.min.apply(null,full.map(e=>e.sec)):null;
  document.getElementById("b-best").innerHTML=(best!=null?fmt(best):"\u2013")+'<span class="u">b\u00e4sta 400</span>';
  const bg=document.getElementById("b-gap");
  if(best==null){bg.className="gap";bg.textContent=be.length?"Bygg upp till hela 400.":"";}
  else if(best<=B_GOAL){bg.className="gap hit";bg.textContent="M\u00e5l n\u00e5tt. Snyggt.";}
  else{bg.className="gap";bg.textContent=fmt(best-B_GOAL)+" kvar till under 20:00";}
  lineChart("b-chart",be.map(e=>({y:e.sec,lbl:dShort(e.date),solid:e.total>=400})),B_GOAL,getComputedStyle(document.documentElement).getPropertyValue("--ember").trim(),fmt);
  const bl=document.getElementById("b-log");
  bl.innerHTML=be.length?be.slice().reverse().map(e=>'<div class="lrow"><span>'+dShort(e.date)+' \u00b7 '+e.total+' rep</span><b>'+fmt(e.sec)+'</b></div>').join(""):'<div class="empty">Logga Burner-tid p\u00e5 Idag-fliken.</div>';

  const se=sprintEntries();
  const best300=se.filter(e=>e.dist===300).map(e=>e.sec);
  const sbest=best300.length?Math.min.apply(null,best300):null;
  document.getElementById("s-best").innerHTML=(sbest!=null?fmt(sbest):"\u2013")+'<span class="u">b\u00e4sta 300 m</span>';
  document.getElementById("s-gap").textContent=sbest!=null?(sbest<=76?"Under 1:16. Vass.":"Riktm\u00e4rke 1:16"):"Logga en spurt p\u00e5 Idag-fliken.";
  const sl=document.getElementById("s-log");
  sl.innerHTML=se.length?se.slice().reverse().map(e=>'<div class="lrow"><span>'+dShort(e.date)+' \u00b7 '+e.antal+'\u00d7'+e.dist+' m</span><b>'+fmt(e.sec)+'</b></div>').join(""):'<div class="empty">Inga spurter \u00e4n.</div>';

  const cbest=cooper.length?Math.max.apply(null,cooper.map(e=>e.m)):null;
  document.getElementById("c-best").innerHTML=(cbest!=null?cbest:"\u2013")+'<span class="u">b\u00e4sta m</span>';
  const cg=document.getElementById("c-gap");
  if(cbest==null){cg.className="gap";cg.textContent="K\u00f6r ett baslinjetest.";}
  else if(cbest>=C_GOAL){cg.className="gap hit";cg.textContent="M\u00e5l n\u00e5tt. \u00d6ver 2400 m.";}
  else{cg.className="gap";cg.textContent=(C_GOAL-cbest)+" m kvar till 2400.";}
  lineChart("c-chart",cooper.map(e=>({y:e.m,lbl:dShort(e.date),solid:true})),C_GOAL,getComputedStyle(document.documentElement).getPropertyValue("--cyan").trim(),v=>v+"m");
  const cl=document.getElementById("c-log");
  cl.innerHTML=cooper.length?cooper.slice().reverse().map(e=>'<div class="lrow"><span>'+dShort(e.date)+'</span><b>'+e.m+' m</b></div>').join(""):'<div class="empty">Inga test \u00e4n.</div>';
}
document.getElementById("c-add").addEventListener("click",async function(){
  const m=parseInt(document.getElementById("c-meters").value,10);if(!m||m<=0)return;
  cooper.push({id:Date.now(),date:todayISO(),m:m});await save("cooper-log",cooper);
  document.getElementById("c-meters").value="";renderGoals();
});

/* -------- NAV -------- */
document.querySelectorAll(".nav button").forEach(function(btn){btn.addEventListener("click",function(){
  document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("on"));
  document.getElementById("v-"+btn.dataset.v).classList.add("on");
});});

init();
</script>
