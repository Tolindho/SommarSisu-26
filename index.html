:root{
  --ink:#F4F1EA;
  --panel:#FBF8F2;
  --panel2:#EEF3F1;
  --grid:#DFE7E3;
  --line:#CAD6D3;
  --text:#29424A;
  --muted:#6C8587;
  --ember:#D78C63;
  --cyan:#8DBCC6;
  --gold:#E6C98B;

  --mono:"Space Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;background:var(--ink);color:var(--text);font-family:var(--display);}
body{
  max-width:560px;
  margin:0 auto;
  padding:22px 18px 92px;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  background:linear-gradient(180deg,#F7F4EE 0%,#EEF4F1 52%,#F5EFE5 100%);
}
.eyebrow{
  font-family:var(--mono);
  font-size:10px;
  letter-spacing:.26em;
  text-transform:uppercase;
  color:var(--muted);
}
h1{
  font-size:25px;
  font-weight:700;
  margin:5px 0 0;
  letter-spacing:-.01em;
}
.head{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  border-bottom:1px solid var(--line);
  padding-bottom:16px;
  margin-bottom:22px;
}
.head .cd{text-align:right;}
.head .cd .n{
  font-family:var(--mono);
  font-weight:700;
  font-size:26px;
  color:var(--gold);
  line-height:1;
}
.head .cd .l{
  font-family:var(--mono);
  font-size:9px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--muted);
  margin-top:3px;
}
.view{display:none;}
.view.on{display:block;animation:fade .25s ease;}
@keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

.crownwrap{text-align:center;padding:8px 0 4px;}
.crowns{
  font-size:34px;
  letter-spacing:8px;
  line-height:1;
  filter:grayscale(.15) opacity(.55);
}
.crowns .lit{filter:none;display:inline-block;}
.crowns .lit.pop{animation:pop .45s ease;}
@keyframes pop{
  0%{transform:scale(.4);}
  60%{transform:scale(1.25);}
  100%{transform:scale(1);}
}
.count{
  font-family:var(--mono);
  font-weight:700;
  font-size:15px;
  margin-top:8px;
  color:var(--muted);
}
.count b{color:var(--gold);}
.perfect{
  color:var(--gold);
  font-weight:600;
  font-size:13px;
  min-height:16px;
  margin-top:2px;
}
