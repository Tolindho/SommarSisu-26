<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sommarträning 2026</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sommarträning 2026">
<meta name="theme-color" content="#F4F1EA">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#F4F1EA;
  --panel:#FBF8F2;
  --panel2:#EEF3F1;
  --grid:#DFE7E3;
  --line:#CAD6D3;
  --text:#29424A;
  --muted:#6C8587;
  --ember:#D78C63;
  --cyan:#8DBCC6;
  --gold:#E6C98B;
  --gold2:#C89254;
  --display:"Space Grotesk",system-ui,sans-serif;
  --mono:"Space Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;background:var(--ink);color:var(--text);font-family:var(--display);}
body{
  max-width:560px;
  margin:0 auto;
  padding:22px 18px 92px;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  background:linear-gradient(180deg,#F7F4EE 0%,#EEF4F1 52%,#F5EFE5 100%);
}
.eyebrow{
  font-family:var(--mono);
  font-size:10px;
  letter-spacing:.26em;
  text-transform:uppercase;
  color:var(--muted);
}
h1{
  font-size:25px;
  font-weight:700;
  margin:5px 0 0;
  letter-spacing:-.01em;
}
.head{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  border-bottom:1px solid var(--line);
  padding-bottom:16px;
  margin-bottom:22px;
}
.head .cd{text-align:right;}
.head .cd .n{
  font-family:var(--mono);
  font-weight:700;
  font-size:26px;
  color:var(--gold);
  line-height:1;
}
.head .cd .l{
  font-family:var(--mono);
  font-size:9px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--muted);
  margin-top:3px;
}
.view{display:none;}
.view.on{display:block;animation:fade .25s ease;}
@keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

.crownwrap{text-align:center;padding:8px 0 4px;}
.crowns{
  font-size:34px;
  letter-spacing:8px;
  line-height:1;
  filter:grayscale(.15) opacity(.55);
}
.crowns .lit{filter:none;display:inline-block;}
.crowns .lit.pop{animation:pop .45s ease;}
@keyframes pop{
  0%{transform:scale(.4);}
  60%{transform:scale(1.25);}
  100%{transform:scale(1);}
}
.count{
  font-family:var(--mono);
  font-weight:700;
  font-size:15px;
  margin-top:8px;
  color:var(--muted);
}
.count b{color:var(--gold);}
.perfect{
  color:var(--gold);
  font-weight:600;
  font-size:13px;
  min-height:16px;
  margin-top:2px;
}

.cat{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:18px;
  margin-top:12px;
  overflow:hidden;
  transition:border-color .15s,box-shadow .15s;
  box-shadow:0 6px 18px rgba(41,66,74,.05);
}
.cat.done{border-color:var(--gold);}
.cathead{
  display:flex;
  align-items:center;
  gap:13px;
  padding:13px 14px;
  cursor:pointer;
}
.cathead .ico{
  font-size:23px;
  width:30px;
  text-align:center;
  flex:0 0 30px;
}
.cathead .mid{flex:1;min-width:0;}
.cathead .nm{
  font-weight:600;
  font-size:15px;
}
.cat.done .nm{color:var(--gold2);}
.cathead .hint{
  font-size:12px;
  color:var(--muted);
  margin-top:2px;
}
.cathead .chk{
  flex:0 0 28px;
  width:28px;
  height:28px;
  border-radius:50%;
  border:2px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  color:transparent;
  transition:all .18s;
}
.cat.done .chk{
  background:var(--gold);
  border-color:var(--gold);
  color:#29424A;
}
.detail{
  border-top:1px solid var(--line);
  padding:16px;
  display:none;
  background:linear-gradient(180deg,rgba(255,255,255,.55),rgba(238,243,241,.65));
}
.cat.open .detail{display:block;}

.seg{
  display:flex;
  gap:8px;
  margin-bottom:12px;
}
.seg button{
  flex:1;
  background:var(--panel2);
  border:1px solid var(--line);
  color:var(--muted);
  border-radius:12px;
  padding:10px;
  font-family:var(--display);
  font-size:13px;
  cursor:pointer;
}
.seg button.on{
  border-color:var(--cyan);
  color:#3C6670;
  background:#E5F0F2;
}
.fields{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:flex-end;
}
.fld{flex:1;min-width:60px;}
.fld.w{flex:0 0 100%;}
label{
  display:block;
  font-family:var(--mono);
  font-size:9px;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:4px;
}
input{
  width:100%;
  background:#FFFEFC;
  border:1px solid var(--line);
  color:var(--text);
  font-family:var(--mono);
  font-size:14px;
  border-radius:10px;
  padding:10px;
}
.save{
  margin-top:12px;
  width:100%;
  cursor:pointer;
  border:none;
  border-radius:12px;
  padding:12px;
  font-weight:600;
  font-size:14px;
  color:#29424A;
  background:var(--gold);
  font-family:var(--display);
  box-shadow:0 6px 14px rgba(200,146,84,.16);
}
.save:hover{filter:brightness(1.06);}

.spec{
  font-size:13px;
  color:var(--text);
  line-height:1.6;
  margin-bottom:10px;
}
.spec .m{color:var(--muted);}
.specrow{
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid var(--grid);
  padding:5px 0;
  font-size:13px;
}
.specrow b{font-family:var(--mono);}
.doneline{
  font-size:13px;
  color:var(--gold2);
  margin-bottom:10px;
}
.undo{
  background:none;
  border:1px solid var(--line);
  color:var(--muted);
  border-radius:8px;
  padding:8px 12px;
  font-family:var(--display);
  font-size:12px;
  cursor:pointer;
}

.kx{
  display:flex;
  align-items:center;
  gap:11px;
  padding:10px 2px;
  border-bottom:1px solid var(--grid);
  cursor:pointer;
}
.kx:last-child{border-bottom:none;}
.kx .box{
  flex:0 0 22px;
  width:22px;
  height:22px;
  border-radius:6px;
  border:2px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  color:transparent;
}
.kx.on .box{
  background:var(--cyan);
  border-color:var(--cyan);
  color:#29424A;
}
.kx .kn{font-size:14px;}
.kx.on .kn{color:var(--text);}
.kcount{
  font-family:var(--mono);
  font-size:11px;
  color:var(--muted);
  margin-top:10px;
  text-align:center;
}
.kcount b{color:var(--gold);}

.stats{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:9px;
  margin-top:18px;
}
.stat{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px 10px;
  text-align:center;
  box-shadow:0 6px 18px rgba(41,66,74,.05);
}
.stat .v{
  font-family:var(--mono);
  font-weight:700;
  font-size:22px;
  line-height:1;
}
.stat .v.gold{color:var(--gold);}
.stat .k{
  font-size:10px;
  color:var(--muted);
  letter-spacing:.06em;
  margin-top:5px;
  text-transform:uppercase;
}
.badge{
  margin-top:16px;
  background:linear-gradient(180deg,#F5F7F4,#EEF3F1);
  border:1px dashed var(--line);
  border-radius:16px;
  padding:14px 16px;
  font-size:13px;
  color:var(--muted);
}
.badge b{color:var(--gold);}

.upcoming{
  padding:16px 18px;
  margin-top:14px;
}
.upcoming #upcoming-list{
  margin-top:10px;
  display:grid;
  gap:8px;
}
.uprow{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
  padding:10px 0;
  border-bottom:1px solid var(--grid);
}
.uprow:last-child{border-bottom:none;padding-bottom:0;}
.upday{
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--muted);
  min-width:74px;
}
.upplan{flex:1;font-size:14px;color:var(--text);}
.uphint{
  display:block;
  font-size:12px;
  color:var(--muted);
  margin-top:2px;
}
.edayplan{
  margin:6px 0 10px;
  padding:12px 14px;
  border-radius:14px;
  background:var(--panel2);
  border:1px solid var(--line);
  font-size:13px;
  color:var(--text);
  line-height:1.5;
}
.edayplan .m{color:var(--muted);}

/* CALENDAR */
.calhead{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  margin-bottom:10px;
}
.calhead .t{
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--muted);
}
.legend{
  font-size:11px;
  color:var(--muted);
}
.week{
  display:grid;
  grid-template-columns:26px repeat(7,1fr);
  gap:5px;
  margin-bottom:5px;
  align-items:center;
}
.week .wl{
  font-family:var(--mono);
  font-size:10px;
  color:var(--muted);
}
.cell{
  aspect-ratio:1/1;
  border-radius:10px;
  background:var(--panel2);
  border:1px solid var(--line);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  padding:2px;
}
.cell .d{
  font-family:var(--mono);
  font-size:10px;
  color:var(--muted);
  line-height:1;
}
.cell .dots{
  display:flex;
  gap:2px;
  margin-top:3px;
}
.cell .dot{
  width:5px;
  height:5px;
  border-radius:50%;
  background:#C7D9D6;
}
.cell .dot.on{background:var(--gold);}
.cell.c1{background:#E6F0EC;}
.cell.c2{background:#F1E5C8;}
.cell.c3{
  background:#E6C98B;
  border-color:#C89254;
}
.cell.c3 .d{color:#29424A;}
.cell.c3 .dot{background:rgba(41,66,74,.18);}
.cell.c3 .dot.on{background:#29424A;}
.cell.today{box-shadow:0 0 0 2px var(--cyan);}
.cell.future{opacity:.4;cursor:default;}
.cell.blank{
  background:none;
  border:none;
  cursor:default;
}

.editor{
  margin-top:18px;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
  box-shadow:0 6px 18px rgba(41,66,74,.05);
}
.editor .et{
  font-size:14px;
  font-weight:600;
  margin-bottom:4px;
}
.editor .es{
  font-size:12px;
  color:var(--muted);
  margin-bottom:10px;
}
.mini{display:flex;gap:8px;}
.mini button{
  flex:1;
  background:var(--panel2);
  border:1px solid var(--line);
  color:var(--muted);
  border-radius:12px;
  padding:12px 6px;
  font-family:var(--display);
  font-size:13px;
  cursor:pointer;
}
.mini button .mi{
  font-size:18px;
  display:block;
  margin-bottom:3px;
}
.mini button.on{
  border-color:var(--gold);
  background:#F8F1DE;
  color:#8D6B37;
}

.card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px;
  margin-bottom:16px;
  box-shadow:0 6px 18px rgba(41,66,74,.05);
}
.card.ember{box-shadow:inset 0 2px 0 rgba(215,140,99,.42),0 6px 18px rgba(41,66,74,.05);}
.card.cyan{box-shadow:inset 0 2px 0 rgba(141,188,198,.52),0 6px 18px rgba(41,66,74,.05);}
.card.aqua{box-shadow:inset 0 2px 0 rgba(181,206,192,.58),0 6px 18px rgba(41,66,74,.05);}
.card .tag{
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:.2em;
  text-transform:uppercase;
}
.ember .tag{color:var(--ember);}
.cyan .tag{color:var(--cyan);}
.aqua .tag{color:var(--gold2);}
.card .goal{
  font-size:12px;
  color:var(--muted);
  margin-top:3px;
}
.big{
  font-family:var(--mono);
  font-weight:700;
  font-size:34px;
  margin:12px 0 2px;
  line-height:1;
}
.ember .big{color:var(--ember);}
.cyan .big{color:var(--cyan);}
.aqua .big{color:var(--gold2);}
.big .u{
  font-size:14px;
  color:var(--muted);
  font-weight:400;
  margin-left:6px;
}
.gap{
  font-size:13px;
  color:var(--muted);
  min-height:17px;
}
.gap.hit{
  color:var(--gold);
  font-weight:600;
}
svg{display:block;width:100%;height:120px;margin:10px 0 4px;}
.axislbl{
  font-family:var(--mono);
  font-size:9px;
  fill:var(--muted);
}
.loglist{
  margin-top:10px;
  border-top:1px solid var(--line);
  padding-top:8px;
}
.lrow{
  display:flex;
  justify-content:space-between;
  font-family:var(--mono);
  font-size:12px;
  color:var(--muted);
  padding:4px 0;
}
.lrow b{color:var(--text);}
.empty{font-size:12px;color:var(--muted);}

.nav{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  background:rgba(251,248,242,.9);
  backdrop-filter:blur(12px);
  border-top:1px solid var(--line);
  display:flex;
  max-width:560px;
  margin:0 auto;
  padding:8px 0 calc(8px + env(safe-area-inset-bottom));
  z-index:5;
}
.nav button{
  flex:1;
  background:none;
  border:none;
  color:var(--muted);
  font-family:var(--display);
  font-size:11px;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  padding:4px;
}
.nav button .ni{font-size:18px;}
.nav button.on{color:#8D6B37;}

input:focus,button:focus-visible{
  outline:2px solid var(--gold);
  outline-offset:2px;
}
@media (prefers-reduced-motion: reduce){
  *{animation:none !important;transition:none !important;}
}
</style>
</head>
<body>
  <div class="head">
    <div>
      <div class="eyebrow">Form mot 5.8 · 2026</div>
      <h1>Sommarträning 2026</h1>
    </div>
    <div class="cd">
      <div class="n" id="daysleft">–</div>
      <div class="l">dagar kvar</div>
    </div>
  </div>

  <section class="view on" id="v-today">
    <div class="crownwrap">
      <div class="crowns" id="crownrow">☼☼☼</div>
      <div class="count" id="todaycount"></div>
      <div class="perfect" id="perfectmsg"></div>
    </div>

    <div class="upcoming card" id="upcoming">
      <div class="tag">Nästa 5 dagar</div>
      <div class="goal">Planerad rytm framåt</div>
      <div id="upcoming-list"></div>
    </div>

    <div id="cats"></div>

    <div class="stats">
      <div class="stat">
        <div class="v gold" id="st-streak">0</div>
        <div class="k">svit, dagar</div>
      </div>
      <div class="stat">
        <div class="v" id="st-perfect">0</div>
        <div class="k">perfekta dagar</div>
      </div>
      <div class="stat">
        <div class="v" id="st-total">0</div>
        <div class="k">ankare totalt</div>
      </div>
    </div>

    <div class="badge" id="badge"></div>
    <div id="storeinfo" style="text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--muted);margin-top:14px;"></div>
  </section>

  <section class="view" id="v-cal">
    <div class="calhead">
      <div class="t">Ankarkalender 19.6 – 5.8</div>
      <div class="legend" id="weekcrowns"></div>
    </div>
    <div id="calendar"></div>
    <div class="editor" id="editor"></div>
  </section>

  <section class="view" id="v-goals">
    <div class="card ember">
      <div class="tag">Burner 400</div>
      <div class="goal">Mål: hela 400 under 20:00</div>
      <div class="big" id="b-best">–<span class="u">bästa 400</span></div>
      <div class="gap" id="b-gap"></div>
      <svg id="b-chart" viewBox="0 0 300 120" preserveAspectRatio="none"></svg>
      <div class="loglist" id="b-log"></div>
    </div>

    <div class="card aqua">
      <div class="tag">Spurter</div>
      <div class="goal">Bästa tid per distans</div>
      <div class="big" id="s-best">–<span class="u">bästa 300 m</span></div>
      <div class="gap" id="s-gap"></div>
      <div class="loglist" id="s-log"></div>
    </div>

    <div class="card cyan">
      <div class="tag">Cooper</div>
      <div class="goal">Mål: över 2400 m på 12 min</div>
      <div class="big" id="c-best">–<span class="u">bästa m</span></div>
      <div class="gap" id="c-gap"></div>
      <svg id="c-chart" viewBox="0 0 300 120" preserveAspectRatio="none"></svg>
      <div class="loglist" id="c-log"></div>

      <div class="fields" style="margin-top:10px;">
        <div class="fld">
          <label>Cooper meter</label>
          <input id="c-meters" type="number" min="0" step="10" placeholder="2300" inputmode="numeric">
        </div>
        <button class="save" style="flex:0 0 auto;width:auto;padding:10px 16px;" id="c-add">Logga</button>
      </div>
    </div>
  </section>

  <nav class="nav">
    <button data-v="today" class="on"><span class="ni">☼</span>Idag</button>
    <button data-v="cal"><span class="ni">▦</span>Kalender</button>
    <button data-v="goals"><span class="ni">○</span>Mål</button>
  </nav>

<script>
const GOALDATE = new Date(2026,7,5,23,59,59);
const START = new Date(2026,5,19);
const BGOAL = 1200;
const CGOAL = 2400;
const KNEE = [
  ["k1","Ryggrotation med käpp"],
  ["k2","Foam roller framsida lår"],
  ["k3","Foam roller ITB, utsida lår"],
  ["k4","Bäckentippning"],
  ["k5","Höftabduktion ytterrotation"]
];
const BURNER = [
  {sq:10,pu:10,mc:10,bu:5,r:3},
  {sq:15,pu:15,mc:15,bu:8,r:3},
  {sq:15,pu:15,mc:15,bu:10,r:4},
  {sq:20,pu:20,mc:20,bu:12,r:4},
  {sq:20,pu:20,mc:20,bu:15,r:5},
  {sq:20,pu:20,mc:20,bu:20,r:5},
  {sq:20,pu:20,mc:20,bu:20,r:5}
];
const ANCHOR = 2693;

let days = {};
let cooper = [];
let openCat = null;
let uiRunType = null;
let lastTodayCount = 0;

const pad = n => String(n).padStart(2,"0");
const iso = d => d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
const todayISO = () => iso(new Date());
const dShort = s => {
  const p = s.split("-");
  return p[2]+"."+p[1];
};

const fmt = s => {
  if(s == null || isNaN(s)) return "–";
  const m = Math.floor(s/60);
  const sec = Math.round(s%60);
  return m+":"+pad(sec);
};

const parseTime = s => {
  s = s.trim();
  if(!s) return null;
  if(s.includes(":")){
    const a = s.split(":");
    const v = (+a[0])*60 + (+a[1]);
    return isNaN(v)?null:v;
  }
  const v = +s;
  return isNaN(v)?null:v;
};

const burnerTotal = w => w.sq*w.r + w.pu*w.r + w.mc*w.r + w.bu*w.r;

const crownCount = o => {
  if(!o) return 0;
  return (o.run && o.run.done?1:0) +
         (o.str && o.str.done?1:0) +
         (o.knee && o.knee.done?1:0);
};

const weekIndex = d => {
  if(d < START) return 1;
  return Math.min(Math.max(Math.floor((d-START)/864e5/7)+1,1),7);
};

const daysLeft = () => Math.max(0,Math.ceil((GOALDATE - new Date())/864e5));

const hasWS = (typeof window!=="undefined" && window.storage && window.storage.get && window.storage.set);

async function loadKey(k,def){
  if(hasWS){
    try{
      const r = await window.storage.get(k);
      return r && r.value ? JSON.parse(r.value) : def;
    }catch(e){}
  }
  try{
    const v = localStorage.getItem("ss26-"+k);
    if(v!=null) return JSON.parse(v);
  }catch(e){}
  return def;
}
async function saveKey(k,v){
  if(hasWS){
    try{
      await window.storage.set(k,JSON.stringify(v));
    }catch(e){}
  }
  try{
    localStorage.setItem("ss26-"+k,JSON.stringify(v));
  }catch(e){}
}
function storageMode(){
  if(hasWS) return "claude";
  try{
    localStorage.setItem("ss26-test","1");
    localStorage.removeItem("ss26-test");
    return "local";
  }catch(e){
    return "memory";
  }
}

async function init(){
  days = await loadKey("days",{});
  cooper = await loadKey("cooper-log",[]);
  document.getElementById("daysleft").textContent = daysLeft();
  renderToday();
  renderCal();
  renderGoals();
  renderUpcoming();
  const sm = storageMode();
  document.getElementById("storeinfo").textContent =
    sm==="claude" ? "Lagring: Claude-appen, synkar i den här chatten" :
    sm==="local" ? "Lagring: lokalt på enheten, sparas mellan gångerna" :
                   "Lagring: endast denna session";
}

/* HELPERS */

function dayObj(d){
  if(!days[d]) days[d] = {};
  return days[d];
}

function dayNameShort(ds){
  const d = new Date(ds);
  return ["Sön","Mån","Tis","Ons","Tor","Fre","Lör"][d.getDay()];
}

function runHint(wd){
  if(wd===2) return "Idag spurter eller intervaller";
  if(wd===1 || wd===4) return "Idag vila eller lugn PK";
  return "Idag PK i låg puls";
}

function strHint(wd,wk){
  if(wd===3) return "Idag Burner v"+wk;
  if(wd===6) return "Idag tung styrka / kraft";
  return "Idag valfritt styrkepass";
}

function planForDate(ds){
  const d = new Date(ds);
  const wd = d.getDay();
  const wk = weekIndex(d);
  const run = runHint(wd);
  let styrka = strHint(wd,wk);
  if(wd===3) styrka = "Burner v"+wk;
  if(wd===6) styrka = "Tung styrka";
  const o = days[ds] || {};
  const runDone = o.run && o.run.done;
  const strDone = o.str && o.str.done;
  const kneeDone = o.knee && o.knee.done;
  return {
    run: runDone ? "Löpning: genomfört" : run,
    styrka: strDone ? "Styrka: genomfört" : styrka,
    knee: kneeDone ? "Knä-övningar: genomförda" : "Knä-övningar, ankare vid 2"
  };
}

function renderUpcoming(){
  const el = document.getElementById("upcoming-list");
  if(!el) return;
  const base = new Date();
  const rows = [];
  for(let i=1;i<=5;i++){
    const d = new Date(base.getFullYear(),base.getMonth(),base.getDate()+i);
    const ds = iso(d);
    const p = planForDate(ds);
    rows.push(
      `<div class="uprow"><div class="upday">${dayNameShort(ds)} ${dShort(ds)}</div>`+
      `<div class="upplan">${p.run}<span class="uphint">${p.styrka} · ${p.knee}</span></div></div>`
    );
  }
  el.innerHTML = rows.join("");
}

/* TODAY */

function streaks(){
  let total=0, perfect=0;
  for(const k in days){
    const c = crownCount(days[k]);
    total += c;
    if(c===3) perfect++;
  }
  let streak=0;
  const t = todayISO();
  let d = new Date();
  if(crownCount(days[t])>0){
    while(crownCount(days[iso(d)])>0){
      streak++;
      d.setDate(d.getDate()-1);
    }
  }
  return {total,perfect,streak};
}

function renderToday(){
  const t = todayISO();
  const o = dayObj(t);
  const wd = new Date().getDay();
  const wk = weekIndex(new Date());
  const c = crownCount(o);

  const row = document.getElementById("crownrow");
  row.innerHTML = [0,1,2].map(i=>`<span class="${c>i?'lit':''}">☼</span>`).join("");
  if(c>lastTodayCount){
    const lit = row.querySelectorAll(".lit");
    if(lit.length) lit[lit.length-1].classList.add("pop");
  }
  lastTodayCount = c;
  document.getElementById("todaycount").innerHTML = `Idag: <b>${c}</b>/3 ankare`;
  document.getElementById("perfectmsg").textContent = c===3 ? "Perfekt dag. Alla tre." : "";

  const st = streaks();
  document.getElementById("st-streak").textContent = st.streak;
  document.getElementById("st-perfect").textContent = st.perfect;
  document.getElementById("st-total").textContent = st.total;

  const marks = [10,25,50,75,100,150];
  const next = marks.find(m=>m>st.total);
  document.getElementById("badge").innerHTML =
    next ? `Nästa märke vid <b>${next}</b> ankare. ${next-st.total} kvar.` :
           `Alla märken tagna. <b>${st.total}</b> ankare. Respekt.`;

  const cEl = document.getElementById("cats");
  cEl.innerHTML =
    catBlock("run","🏃","Löpning",runHint(wd),o.run && o.run.done,runDetail(t,o,wd))+
    catBlock("str","💪","Lihaskunto",strHint(wd,wk),o.str && o.str.done,strDetail(t,o,wd,wk))+
    catBlock("knee","🦵","Knä", "Bocka rörelser, ankare vid 2",o.knee && o.knee.done,kneeDetail(t,o));

  wireToday(t,wd,wk);
}

function catBlock(key,ico,nm,hint,done,detailHTML){
  return `<div class="cat${done?' done':''}${openCat===key?' open':''}" data-cat="${key}">
    <div class="cathead" data-head="${key}">
      <div class="ico">${ico}</div>
      <div class="mid">
        <div class="nm">${nm}</div>
        <div class="hint">${hint}</div>
      </div>
      <div class="chk">✓</div>
    </div>
    <div class="detail">${detailHTML}</div>
  </div>`;
}

function runDetail(t,o,wd){
  if(o.run && o.run.done){
    const r = o.run;
    const sum = r.type==="spurt" ? `${r.antal}×${r.dist} m` : `${r.min} min PK`;
    return `<div class="doneline">Loggat: ${sum}</div>
            <button class="undo" data-undo="run">Ångra</button>`;
  }
  let f = "";
  if(uiRunType===null) uiRunType = (wd===2?"spurt":"pk");
  if(uiRunType==="pk"){
    f = `<div class="fields">
      <div class="fld w">
        <label>Tid min</label>
        <input id="r-min" type="number" min="1" placeholder="45" inputmode="numeric">
      </div>
    </div>`;
  }else{
    f = `<div class="fields">
      <div class="fld">
        <label>Längd m</label>
        <input id="r-dist" type="number" value="300" inputmode="numeric">
      </div>
      <div class="fld">
        <label>Antal</label>
        <input id="r-antal" type="number" value="5" inputmode="numeric">
      </div>
      <div class="fld">
        <label>Bästa tid</label>
        <input id="r-best" type="text" placeholder="1:16" inputmode="numeric">
      </div>
    </div>`;
  }
  return `<div class="seg">
      <button data-rt="pk" class="${uiRunType==="pk"?"on":""}">PK</button>
      <button data-rt="spurt" class="${uiRunType==="spurt"?"on":""}">Spurter</button>
    </div>
    ${f}
    <button class="save" data-save="run">Spara pass</button>`;
}

function strDetail(t,o,wd,wk){
  if(o.str && o.str.done){
    const s = o.str;
    let sum = "";
    if(s.type==="burner") sum = `Burner, ${s.total} totala reps${s.sec?`, ${fmt(s.sec)} min`:""}`;
    else if(s.type==="styrka") sum = "Tung styrka";
    else sum = "Extrapass";
    return `<div class="doneline">Loggat: ${sum}</div>
            <button class="undo" data-undo="str">Ångra</button>`;
  }
  if(wd===3){
    const w = BURNER[wk-1] || BURNER[BURNER.length-1];
    const tot = burnerTotal(w);
    let rows = `
      <div class="specrow"><span>Knäböj</span><b>${w.r}×${w.sq}</b></div>
      <div class="specrow"><span>Armhävningar</span><b>${w.r}×${w.pu}</b></div>
      <div class="specrow"><span>Mountain climbers</span><b>${w.r}×${w.mc}</b></div>
      <div class="specrow"><span>Burpees</span><b>${w.r}×${w.bu}</b></div>`;
    return `<div class="spec">
        <b>Burner v${wk}</b> · <span class="m">${w.r} varv · ${tot} rep totalt</span>
      </div>
      ${rows}
      <div class="fields" style="margin-top:12px;">
        <div class="fld w">
          <label>Tid mm:ss</label>
          <input id="s-time" type="text" placeholder="${tot>=400?'19:30':'frivilligt'}" inputmode="numeric">
        </div>
      </div>
      <button class="save" data-save="str">Spara Burner</button>`;
  }
  if(wd===6){
    return `<div class="spec">
        Tung styrka helkropp: knäböj, marklyft, utfall, press, rodd.
        <span class="m">Passet för kraften.</span>
      </div>
      <button class="save" data-save="str">Klar</button>`;
  }
  return `<div class="spec">
      Valfritt extrapass om kroppen vill.
      <span class="m">Annars vila.</span>
    </div>
    <button class="save" data-save="str">Klar</button>`;
}

function kneeDetail(t,o){
  const done = o.knee && o.knee.ex ? o.knee.ex : [];
  const list = KNEE.map(([id,name])=>{
    const on = done.indexOf(id)>=0;
    return `<div class="kx${on?' on':''}" data-kex="${id}">
      <div class="box">✓</div>
      <div class="kn">${name}</div>
    </div>`;
  }).join("");
  return `${list}
    <div class="kcount">${done.length} / 5 gjorda · ankare vid <b>2</b></div>`;
}

function wireToday(t,wd,wk){
  document.querySelectorAll("[data-head]").forEach(el=>{
    el.addEventListener("click",()=>{
      const k = el.getAttribute("data-head");
      openCat = (openCat===k?null:k);
      if(k==="run") uiRunType = null;
      renderToday();
    });
  });
  document.querySelectorAll("[data-rt]").forEach(b=>{
    b.addEventListener("click",e=>{
      e.stopPropagation();
      uiRunType = b.getAttribute("data-rt");
      renderToday();
    });
  });
  document.querySelectorAll("[data-save]").forEach(b=>{
    b.addEventListener("click",async e=>{
      e.stopPropagation();
      const k = b.getAttribute("data-save");
      if(k==="run") await saveRun(t);
      else await saveStr(t,wd,wk);
    });
  });
  document.querySelectorAll("[data-undo]").forEach(b=>{
    b.addEventListener("click",async e=>{
      e.stopPropagation();
      const k = b.getAttribute("data-undo");
      const o = dayObj(t);
      delete o[k];
      await saveKey("days",days);
      openCat = null;
      renderToday();
      renderCal();
      renderGoals();
      renderUpcoming();
    });
  });
  document.querySelectorAll("[data-kex]").forEach(b=>{
    b.addEventListener("click",async e=>{
      e.stopPropagation();
      await toggleKnee(t,b.getAttribute("data-kex"));
    });
  });
}

async function saveRun(t){
  const o = dayObj(t);
  if(uiRunType==="spurt"){
    const dist = parseInt(document.getElementById("r-dist").value,10);
    const antal = parseInt(document.getElementById("r-antal").value,10);
    const sec = parseTime(document.getElementById("r-best").value);
    if(!dist || !antal || sec==null) return;
    o.run = {done:true,type:"spurt",dist,antal,sec};
  }else{
    const min = parseInt(document.getElementById("r-min").value,10);
    if(!min) return;
    o.run = {done:true,type:"pk",min};
  }
  await saveKey("days",days);
  openCat = null;
  renderToday();
  renderCal();
  renderGoals();
  renderUpcoming();
}

async function saveStr(t,wd,wk){
  const o = dayObj(t);
  if(wd===3){
    const w = BURNER[wk-1] || BURNER[BURNER.length-1];
    const tot = burnerTotal(w);
    const sec = parseTime(document.getElementById("s-time").value);
    o.str = {done:true,type:"burner",total:tot,sec};
  }else if(wd===6){
    o.str = {done:true,type:"styrka"};
  }else{
    o.str = {done:true,type:"other"};
  }
  await saveKey("days",days);
  openCat = null;
  renderToday();
  renderCal();
  renderGoals();
  renderUpcoming();
}

async function toggleKnee(t,id){
  const o = dayObj(t);
  if(!o.knee) o.knee = {ex:[],done:false};
  const i = o.knee.ex.indexOf(id);
  if(i>=0) o.knee.ex.splice(i,1);
  else o.knee.ex.push(id);
  o.knee.done = o.knee.ex.length>=2;
  if(o.knee.ex.length===0) delete o.knee;
  await saveKey("days",days);
  renderToday();
  renderCal();
  renderUpcoming();
}

/* CALENDAR */

function allDates(){
  const out = [];
  let d = new Date(START);
  const end = new Date(2026,7,5);
  while(d <= end){
    out.push(iso(d));
    d = new Date(d.getTime()+864e5);
  }
  return out;
}
let selDate = null;

function renderCal(){
  if(!selDate) selDate = todayISO();
  const dates = allDates();
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";
  const t = todayISO();
  for(let w=0; w<7; w++){
    const row = document.createElement("div");
    row.className = "week";
    row.innerHTML = `<div class="wl">v${w+1}</div>`;
    for(let i=0;i<7;i++){
      const idx = w*7+i;
      const ds = dates[idx];
      if(!ds){
        row.insertAdjacentHTML("beforeend",'<div class="cell blank"></div>');
        continue;
      }
      const cnt = crownCount(days[ds]);
      const cell = document.createElement("div");
      cell.className = "cell c"+cnt+(ds===t?" today":"")+(ds>t?" future":"");
      const dots = [0,1,2].map(j=>`<span class="dot${j<cnt?' on':''}"></span>`).join("");
      cell.innerHTML = `<span class="d">${+ds.split("-")[2]}</span><span class="dots">${dots}</span>`;
      if(ds <= t){
        cell.addEventListener("click",()=>{
          selDate = ds;
          renderEditor();
        });
      }
      row.appendChild(cell);
    }
    cal.appendChild(row);
  }
  const wk = weekIndex(new Date());
  const ws = new Date(START.getTime()+(wk-1)*7*864e5);
  let wc = 0;
  for(let i=0;i<7;i++){
    wc += crownCount(days[iso(new Date(ws.getTime()+i*864e5))]);
  }
  document.getElementById("weekcrowns").innerHTML =
    `Denna vecka <b style="color:var(--gold)">${wc}</b> ankare`;
  renderEditor();
}

function renderEditor(){
  const ed = document.getElementById("editor");
  const o = days[selDate] || {};
  const isToday = selDate === todayISO();
  const p = planForDate(selDate);
  const cats = [
    ["run","🏃","Löpning"],
    ["str","💪","Lihaskunto"],
    ["knee","🦵","Knä"]
  ];
  ed.innerHTML =
    `<div class="et">${isToday?"Idag, ":""}${dShort(selDate)}</div>`+
    `<div class="es">Snabbmarkera för missade dagar. Full loggning sker på Idag-fliken.</div>`+
    `<div class="edayplan"><b>Plan för dagen</b><br>`+
    `<span class="m">Löpning:</span> ${p.run}<br>`+
    `<span class="m">Styrka:</span> ${p.styrka}<br>`+
    `<span class="m">Knä:</span> ${p.knee}</div>`+
    `<div class="mini">`+
    cats.map(c=>{
      const on = o[c[0]] && o[c[0]].done;
      return `<button data-q="${c[0]}" class="${on?"on":""}"><span class="mi">${c[1]}</span>${c[2]}</button>`;
    }).join("")+
    `</div>`;
  ed.querySelectorAll("[data-q]").forEach(b=>{
    b.addEventListener("click",()=>quickToggle(selDate,b.getAttribute("data-q")));
  });
}

async function quickToggle(date,cat){
  const o = dayObj(date);
  if(!o[cat]) o[cat]={};
  o[cat].done = !o[cat].done;
  if(!o[cat].done){
    if(cat==="knee" && o[cat].ex && o[cat].ex.length){o[cat].done=false;}
    else delete o[cat];
  }
  await saveKey("days",days);
  renderCal();
  renderToday();
  renderUpcoming();
}

/* GOALS */

function burnerEntries(){
  const out = [];
  for(const k in days){
    const s = days[k] && days[k].str;
    if(s && s.type==="burner" && s.sec!=null){
      out.push({date:k,total:s.total||0,sec:s.sec});
    }
  }
  out.sort((a,b)=>a.date<b.date?-1:1);
  return out;
}
function sprintEntries(){
  const out = [];
  for(const k in days){
    const r = days[k] && days[k].run;
    if(r && r.type==="spurt"){
      out.push({date:k,dist:r.dist,antal:r.antal,sec:r.sec});
    }
  }
  out.sort((a,b)=>a.date<b.date?-1:1);
  return out;
}

function lineChart(id,pts,goal,color,fmtFn){
  const svg = document.getElementById(id);
  const W=300,H=120,pL=8,pR=8,pT=12,pB=18;
  const ns="http://www.w3.org/2000/svg";
  svg.innerHTML="";
  if(!pts.length){
    const tx = document.createElementNS(ns,"text");
    tx.setAttribute("x",W/2);
    tx.setAttribute("y",H-24);
    tx.setAttribute("text-anchor","middle");
    tx.setAttribute("class","axislbl");
    tx.textContent="Logga ditt första försök";
    svg.appendChild(tx);
    return;
  }
  const vals = pts.map(p=>p.y).concat(goal||[]);
  let mn = Math.min.apply(null,vals);
  let mx = Math.max.apply(null,vals);
  if(mn===mx){mn-=10;mx+=10;}
  const sp = (mx-mn)||1;
  const X = i => pL + (pts.length===1 ? (W-pL-pR)/2 : (W-pL-pR)*i/(pts.length-1));
  const Y = v => pT + (mx-v)*(H-pT-pB)/sp;

  if(goal!=null){
    const gy = Y(goal);
    const gl = document.createElementNS(ns,"line");
    gl.setAttribute("x1",pL);
    gl.setAttribute("x2",W-pR);
    gl.setAttribute("y1",gy);
    gl.setAttribute("y2",gy);
    gl.setAttribute("stroke",color);
    gl.setAttribute("stroke-width","1");
    gl.setAttribute("stroke-dasharray","4 3");
    gl.setAttribute("opacity",".85");
    svg.appendChild(gl);
    const gt = document.createElementNS(ns,"text");
    gt.setAttribute("x",W-pR);
    gt.setAttribute("y",gy-4);
    gt.setAttribute("text-anchor","end");
    gt.setAttribute("class","axislbl");
    gt.textContent="mål "+fmtFn(goal);
    svg.appendChild(gt);
  }

  if(pts.length>1){
    let d="";
    pts.forEach((p,i)=>{
      const x=X(i), y=Y(p.y);
      d += (i? "L":"M")+x+" "+y;
    });
    const pa = document.createElementNS(ns,"path");
    pa.setAttribute("d",d);
    pa.setAttribute("fill","none");
    pa.setAttribute("stroke",color);
    pa.setAttribute("stroke-width","2");
    pa.setAttribute("stroke-linejoin","round");
    svg.appendChild(pa);
  }
  pts.forEach((p,i)=>{
    const x=X(i), y=Y(p.y);
    const c = document.createElementNS(ns,"circle");
    c.setAttribute("cx",x);
    c.setAttribute("cy",y);
    c.setAttribute("r",p.solid===false?3:4.5);
    c.setAttribute("fill",p.solid===false?"#F4F1EA":color);
    c.setAttribute("stroke",color);
    c.setAttribute("stroke-width","1.6");
    svg.appendChild(c);
    const l=document.createElementNS(ns,"text");
    l.setAttribute("x",x);
    l.setAttribute("y",H-5);
    l.setAttribute("text-anchor","middle");
    l.setAttribute("class","axislbl");
    l.textContent=p.lbl;
    svg.appendChild(l);
  });
}

function renderGoals(){
  const be = burnerEntries();
  const full = be.filter(e=>e.total===400);
  const best = full.length ? Math.min.apply(null,full.map(e=>e.sec||null).filter(v=>v!=null)) : null;
  document.getElementById("b-best").innerHTML =
    best!=null ? fmt(best)+`<span class="u">bästa 400</span>` :
                 `–<span class="u">bästa 400</span>`;
  const bg = document.getElementById("b-gap");
  if(best==null){
    bg.className="gap";
    bg.textContent = be.length ? "Bygg upp till hela 400." : "Logga ett Burner-pass på Idag-fliken.";
  }else if(best<=BGOAL){
    bg.className="gap hit";
    bg.textContent = "Mål nått. Snyggt.";
  }else{
    bg.className="gap";
    bg.textContent = fmt(best-BGOAL)+" kvar till under 20:00.";
  }
  lineChart("b-chart",
    be.map(e=>({y:e.sec||0,lbl:dShort(e.date),solid:e.total===400})),
    BGOAL,
    getComputedStyle(document.documentElement).getPropertyValue("--ember").trim() || "#D78C63",
    fmt
  );
  const bl = document.getElementById("b-log");
  bl.innerHTML = be.length ?
    be.slice().reverse().map(e=>
      `<div class="lrow"><span>${dShort(e.date)} · ${e.total} rep</span><b>${fmt(e.sec)}</b></div>`
    ).join("") :
    `<div class="empty">Logga Burner-tid på Idag-fliken.</div>`;

  const se = sprintEntries();
  const best300 = se.filter(e=>e.dist===300 && e.sec!=null).map(e=>e.sec);
  const sbest = best300.length ? Math.min.apply(null,best300) : null;
  document.getElementById("s-best").innerHTML =
    sbest!=null ? fmt(sbest)+`<span class="u">bästa 300 m</span>` :
                  `–<span class="u">bästa 300 m</span>`;
  document.getElementById("s-gap").textContent =
    sbest!=null ? (sbest<=76 ? "Under 1:16. Vass." : "Riktmärke 1:16.") :
                  "Logga en spurt på Idag-fliken.";
  const sl = document.getElementById("s-log");
  sl.innerHTML = se.length ?
    se.slice().reverse().map(e=>
      `<div class="lrow"><span>${dShort(e.date)} · ${e.antal}×${e.dist} m</span><b>${fmt(e.sec)}</b></div>`
    ).join("") :
    `<div class="empty">Inga spurter än.</div>`;

  const cbest = cooper.length ? Math.max.apply(null,cooper.map(e=>e.m)) : null;
  document.getElementById("c-best").innerHTML =
    cbest!=null ? cbest+`<span class="u">bästa m</span>` :
                  `–<span class="u">bästa m</span>`;
  const cg = document.getElementById("c-gap");
  if(cbest==null){
    cg.className="gap";
    cg.textContent="Gör ett baslinjetest.";
  }else if(cbest>=CGOAL){
    cg.className="gap hit";
    cg.textContent="Mål nått. Över 2400 m.";
  }else{
    cg.className="gap";
    cg.textContent=(CGOAL-cbest)+" m kvar till 2400.";
  }
  lineChart("c-chart",
    cooper.map(e=>({y:e.m,lbl:dShort(e.date),solid:true})),
    CGOAL,
    getComputedStyle(document.documentElement).getPropertyValue("--cyan").trim() || "#8DBCC6",
    v=>v
  );
  const cl = document.getElementById("c-log");
  cl.innerHTML = cooper.length ?
    cooper.slice().reverse().map(e=>
      `<div class="lrow"><span>${dShort(e.date)}</span><b>${e.m} m</b></div>`
    ).join("") :
    `<div class="empty">Inga test än.</div>`;
}

document.getElementById("c-add").addEventListener("click",async ()=>{
  const m = parseInt(document.getElementById("c-meters").value,10);
  if(!m || m<=0) return;
  cooper.push({id:Date.now(),date:todayISO(),m});
  await saveKey("cooper-log",cooper);
  document.getElementById("c-meters").value="";
  renderGoals();
});

/* NAV */

document.querySelectorAll(".nav button").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("on"));
    btn.classList.add("on");
    document.querySelectorAll(".view").forEach(v=>v.classList.remove("on"));
    document.getElementById("v-"+btn.dataset.v).classList.add("on");
  });
});

init();
</script>
</body>
</html>
